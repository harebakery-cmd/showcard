<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HARE,HARE — 쇼카드 출력 시스템</title>

<!-- Freesentation: matches the font family used in the uploaded 25_새이름표.ai reference design -->
<style>
  @font-face{font-family:'Freesentation';font-weight:300;font-style:normal;font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-3Light.woff2') format('woff2');}
  @font-face{font-family:'Freesentation';font-weight:400;font-style:normal;font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-4Regular.woff2') format('woff2');}
  @font-face{font-family:'Freesentation';font-weight:500;font-style:normal;font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-5Medium.woff2') format('woff2');}
  @font-face{font-family:'Freesentation';font-weight:600;font-style:normal;font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-6SemiBold.woff2') format('woff2');}
  @font-face{font-family:'Freesentation';font-weight:700;font-style:normal;font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-7Bold.woff2') format('woff2');}
  @font-face{font-family:'Freesentation';font-weight:800;font-style:normal;font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-8ExtraBold.woff2') format('woff2');}
  @font-face{font-family:'Freesentation';font-weight:900;font-style:normal;font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-9Black.woff2') format('woff2');}
</style>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root{
    --background:#FFFDF8; --foreground:#231916; --card:#FFFFFF; --card-foreground:#231916;
    --primary:#231916; --primary-foreground:#FFFFFF; --secondary:#F5F0E8; --secondary-foreground:#231916;
    --muted:#F5F0E8; --muted-foreground:#8a7a6a; --accent:#C9926B; --accent-foreground:#FFFFFF;
    --destructive:#c0392b; --border:#D9C7B8; --input-background:#FFFDF8; --ring:#C9926B;
    --brand-orange:#C9926B; --brand-teal:#9ED1D7; --placeholder:#D9C7B8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--background); color:var(--foreground);
    font-family:'Freesentation',-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit; cursor:pointer;}
  input,textarea{font-family:inherit;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  .app{min-height:100vh; display:flex; flex-direction:column;}

  /* ── Header ───────────────────────── */
  .header{border-bottom:1px solid var(--border); background:var(--card); padding:12px 24px;
    display:flex; align-items:center; justify-content:space-between; flex-shrink:0; gap:16px; flex-wrap:wrap;}
  .header-left{display:flex; align-items:center; gap:16px; flex-wrap:wrap;}
  .logo-row{display:flex; align-items:center; gap:10px;}
  .logo-badge{width:28px;height:28px;border-radius:6px;background:var(--brand-orange);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:11px;letter-spacing:.15em;flex-shrink:0;}
  .brand-name{font-size:13px;font-weight:900;letter-spacing:.1em;line-height:1.2;}
  .brand-sub{font-size:9px;color:var(--muted-foreground);line-height:1.2;}
  .maintabs{display:flex;border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-left:4px;}
  .maintab-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;font-size:12px;font-weight:700;
    background:#fff;color:#5a4a3a;border:none;transition:all .15s;}
  .maintab-btn.active{background:var(--primary);color:#fff;}
  .maintab-btn:not(.active):hover{background:var(--secondary);}
  .print-btn{display:flex;align-items:center;gap:8px;padding:9px 18px;border-radius:4px;font-size:12px;
    font-weight:800;border:none;background:var(--primary);color:#fff;transition:all .15s;}
  .print-btn:disabled{background:var(--secondary);color:#C4B49A;cursor:not-allowed;}
  .print-btn:not(:disabled):hover{background:#3a2010;}
  .print-btn:not(:disabled):active{transform:scale(.96);}

  /* ── Layout ───────────────────────── */
  .body{flex:1;display:flex;overflow:hidden;min-height:0;}
  .aside{width:390px;flex-shrink:0;border-right:1px solid var(--border);background:var(--card);overflow-y:auto;}
  .aside-inner{padding:20px;display:flex;flex-direction:column;gap:20px;}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--background);}

  .label-eyebrow{font-size:10px;font-weight:800;color:var(--muted-foreground);text-transform:uppercase;
    letter-spacing:.14em;margin-bottom:8px;display:block;}
  .divider{border-top:1px solid var(--border);}

  /* card type chips */
  .type-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .type-chip{padding:6px 12px;border-radius:4px;font-size:12px;font-weight:700;border:1px solid var(--border);
    background:#fff;color:#5a4a3a;transition:all .15s;}
  .type-chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .type-chip:not(.active):hover{border-color:var(--primary);}
  .type-chip .dim{opacity:.4;font-weight:400;font-size:9px;margin-left:4px;}

  /* DB loader */
  .db-wrap{position:relative;}
  .db-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;
    border:1px solid var(--border);border-radius:4px;font-size:12px;color:#5a4a3a;background:var(--input-background);transition:all .15s;}
  .db-toggle:hover{border-color:var(--primary);}
  .db-toggle-label{display:flex;align-items:center;gap:8px;}
  .chev{transition:transform .2s;color:var(--muted-foreground);}
  .chev.open{transform:rotate(180deg);}
  .db-panel{position:absolute;top:calc(100% + 3px);left:0;right:0;z-index:30;background:#fff;
    border:1px solid var(--border);border-radius:4px;box-shadow:0 8px 24px rgba(28,16,7,.12);overflow:hidden;}
  .db-search{width:100%;padding:9px 12px;border:none;border-bottom:1px solid var(--border);font-size:12px;
    outline:none;background:#FFFDF8;}
  .db-list{max-height:240px;overflow-y:auto;}
  .db-item{width:100%;text-align:left;padding:10px 14px;font-size:12px;background:none;border:none;
    border-bottom:1px solid rgba(212,197,169,.5);display:flex;align-items:center;justify-content:space-between;gap:10px;transition:background .15s;}
  .db-item:last-child{border-bottom:none;}
  .db-item:hover{background:var(--secondary);}
  .db-item-name{font-weight:700;color:var(--foreground);}
  .db-item-meta{color:var(--muted-foreground);flex-shrink:0;font-size:10px;}
  .db-item-cat{display:inline-block;font-size:9px;padding:2px 7px;border-radius:20px;background:#F5F0E8;color:#8a7a6a;margin-left:6px;}
  .db-empty{padding:20px;text-align:center;font-size:12px;color:var(--muted-foreground);}
  .db-status{padding:10px 14px;font-size:11px;color:var(--muted-foreground);display:flex;align-items:center;gap:6px;}
  .db-retry{font-size:11px;font-weight:700;color:var(--brand-orange);background:none;border:none;text-decoration:underline;padding:0;}

  /* form fields */
  .field label{font-size:10px;font-weight:800;color:var(--muted-foreground);text-transform:uppercase;letter-spacing:.14em;}
  .field input[type=text], .field input:not([type]), .field textarea{
    margin-top:6px;width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:4px;
    font-size:12px;color:var(--foreground);background:var(--input-background);transition:border-color .15s;resize:none;}
  .field input::placeholder, .field textarea::placeholder{color:var(--placeholder);}
  .field input:focus, .field textarea:focus{outline:none;border-color:var(--primary);}
  .field-hint{font-size:9.5px;color:var(--placeholder);margin-top:5px;line-height:1.4;}

  .origin-list-toggle{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;
    font-weight:700;color:#5a4a3a;border:1px solid var(--border);background:#fff;transition:all .15s;}
  .origin-list-toggle:hover{border-color:var(--primary);color:var(--primary);}
  .origin-combo{position:relative;}
  .origin-panel{position:absolute;top:calc(100% + 3px);left:0;right:0;z-index:30;background:#fff;
    border:1px solid var(--border);border-radius:4px;box-shadow:0 8px 24px rgba(28,16,7,.12);overflow:hidden;}
  .origin-list{max-height:200px;}
  .origin-item-new{background:#FFF6EC;}
  .origin-item-new .db-item-name{color:var(--primary);font-weight:700;}
  .origin-item-new:hover{background:#FCEBD8;}
  .origin-item-row{padding:0 6px 0 0;}
  .origin-item-select{flex:1;min-width:0;text-align:left;padding:10px 8px 10px 14px;background:none;border:none;
    cursor:pointer;font-size:12px;font-family:inherit;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .origin-item-delete{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:none;border:none;
    color:var(--muted-foreground);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:background .15s,color .15s;}
  .origin-item-delete:hover{background:rgba(192,57,43,.12);color:#c0392b;}
  .price-wrap{position:relative;margin-top:6px;}
  .price-wrap input{padding-right:28px;}
  .price-suffix{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--muted-foreground);}
  .discount-toggle{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;
    font-weight:700;color:#5a4a3a;border:1px solid var(--border);background:#fff;transition:all .15s;}
  .discount-toggle:hover{border-color:#D64545;color:#D64545;}
  .discount-toggle.active{background:#FDEEEE;border-color:#D64545;color:#D64545;}
  .discount-wrap{position:relative;margin-top:6px;}
  .discount-wrap input{width:100%;padding:8px 44px 8px 12px;border:1px solid #f0c3c3;border-radius:5px;font-size:12px;
    background:#FFFBFB;color:var(--foreground);}
  .discount-wrap input:focus{outline:none;border-color:#D64545;}
  .discount-suffix{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:10px;color:#D64545;font-weight:700;}

  .allergen-chips{display:flex;flex-wrap:wrap;gap:5px;}
  .allergen-chip{display:flex;align-items:center;gap:3px;padding:5px 9px;border-radius:4px;font-size:10px;
    border:1px solid var(--border);background:#fff;color:#5a4a3a;transition:all .15s;}
  .allergen-chip.active{background:var(--brand-orange);border-color:var(--brand-orange);color:#fff;}
  .allergen-chip:not(.active):hover{border-color:var(--brand-orange);}
  .clear-link{font-size:9px;color:var(--muted-foreground);background:none;border:none;padding:0;}
  .clear-link:hover{color:var(--foreground);}
  .hint{font-size:9px;color:var(--placeholder);margin-top:6px;}

  .actions-row{display:flex;gap:8px;padding-top:2px;}
  .btn-add{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;border-radius:4px;
    font-size:12px;font-weight:800;border:none;color:#fff;background:var(--brand-orange);transition:all .15s;}
  .btn-add:disabled{background:#F5F0E8;color:#C4B49A;cursor:not-allowed;}
  .btn-add:not(:disabled):hover{opacity:.9;}
  .btn-add:not(:disabled):active{transform:scale(.97);}
  .btn-reset{padding:11px 13px;border-radius:4px;font-size:12px;font-weight:700;color:#5a4a3a;
    border:1px solid var(--border);background:#fff;transition:all .15s;}
  .btn-reset:hover{border-color:var(--primary);color:var(--primary);}
  .btn-save-card{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;border-radius:4px;
    font-size:12px;font-weight:800;color:#2C8B86;border:1px solid #9ED1D7;background:#F0FAF9;transition:all .15s;white-space:nowrap;}
  .btn-save-card:disabled{background:#F5F0E8;color:#C4B49A;border-color:var(--border);cursor:not-allowed;}
  .btn-save-card:not(:disabled):hover{background:#E1F3F1;}
  .btn-save-card:not(:disabled):active{transform:scale(.97);}

  /* right main */
  .righttabs{border-bottom:1px solid var(--border);background:var(--card);padding:0 24px;display:flex;flex-shrink:0;}
  .righttab-btn{display:flex;align-items:center;gap:6px;padding:12px 16px;font-size:12px;font-weight:700;
    background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--muted-foreground);transition:all .15s;}
  .righttab-btn.active{border-color:var(--primary);color:var(--primary);}
  .preview-pane{flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:18px;transition:background-color .2s;}
  .preview-pane.dark{background:#211d18;}
  .preview-top-row{display:flex;align-items:center;justify-content:center;gap:10px;position:relative;width:100%;max-width:520px;}
  .preview-caption{font-size:9px;font-weight:800;color:var(--muted-foreground);text-transform:uppercase;letter-spacing:.14em;}
  .preview-pane.dark .preview-caption{color:#a89684;}
  .preview-note{font-size:9px;color:var(--placeholder);}
  .preview-pane.dark .preview-note{color:#6b5f52;}
  .preview-mode-btn{position:absolute;right:0;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;
    font-size:10px;font-weight:700;color:#5a4a3a;border:1px solid var(--border);background:#fff;transition:all .15s;white-space:nowrap;}
  .preview-mode-btn:hover{border-color:var(--primary);color:var(--primary);}
  .preview-pane.dark .preview-mode-btn{background:#2f2a23;border-color:#463c31;color:#cbbba9;}
  .preview-pane.dark .preview-mode-btn:hover{border-color:#a08363;color:#f0c896;}

  .queue-pane{flex:1;overflow:auto;padding:24px;}
  .queue-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:280px;color:var(--muted-foreground);}
  .queue-empty p{margin:0;}
  .queue-empty .t1{font-size:14px;font-weight:600;margin-top:10px;}
  .queue-empty .t2{font-size:12px;opacity:.6;margin-top:4px;}
  .queue-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .queue-head-info{font-size:9px;font-weight:800;color:var(--muted-foreground);text-transform:uppercase;letter-spacing:.14em;}
  .queue-clear{font-size:10px;color:var(--muted-foreground);background:none;border:none;}
  .queue-clear:hover{color:var(--destructive);}
  .queue-items{display:flex;flex-direction:column;gap:8px;}
  .queue-item{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);
    border-radius:4px;padding:12px 16px;}
  .queue-idx{font-size:9px;font-weight:800;color:var(--muted-foreground);width:18px;text-align:right;flex-shrink:0;}
  .queue-thumb{flex-shrink:0;overflow:hidden;line-height:0;}
  .queue-info{flex:1;min-width:0;}
  .queue-name{font-size:12px;font-weight:800;color:var(--foreground);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .queue-sub{font-size:10px;color:var(--muted-foreground);margin-top:2px;}
  .queue-allergen{font-size:9px;margin-top:2px;color:var(--brand-orange);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .queue-del{flex-shrink:0;background:none;border:none;color:var(--placeholder);}
  .queue-del:hover{color:var(--destructive);}

  .saved-item{flex-wrap:wrap;}
  .saved-item-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .saved-load-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 11px;border-radius:4px;font-size:10.5px;
    font-weight:800;color:#fff;background:var(--brand-orange);border:none;white-space:nowrap;transition:all .15s;}
  .saved-load-btn:hover{opacity:.9;}

  /* manage tab */
  .manage-wrap{flex:1;overflow:auto;padding:20px 24px;display:flex;flex-direction:column;gap:22px;}
  .manage-section-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .manage-section-head h2{font-size:14px;font-weight:800;margin:0;}
  .manage-section-head .sub{font-size:11px;color:var(--muted-foreground);}

  .manage-savebar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:14px;
    background:#FFF9F0;border:1px solid var(--border);border-radius:6px;padding:10px 14px;box-shadow:0 2px 8px rgba(28,16,7,.05);}
  .manage-savebar-info{min-width:0;flex:1;}
  .manage-savebar-status{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#8a7a6a;line-height:1.4;}
  .manage-savebar-status.ok{color:#2C8B86;}
  .manage-savebar-status.error{color:#C0392B;}
  .manage-save-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:5px;font-size:12px;
    font-weight:800;background:var(--primary);color:#fff;border:1px solid var(--primary);white-space:nowrap;transition:all .15s;}
  .manage-save-btn:hover:not(:disabled){background:#3a2010;}
  .manage-save-btn:disabled{opacity:.55;cursor:wait;}
  .spin{animation:spin 1s linear infinite;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

  .manage-columns{display:grid;grid-template-columns:1fr 380px;gap:24px;align-items:start;}
  @media(max-width:980px){.manage-columns{grid-template-columns:1fr;}}
  .manage-col-left{min-width:0;}
  .manage-col-right{min-width:0;display:flex;flex-direction:column;gap:14px;position:sticky;top:58px;}

  .manage-bulk-section{}
  .bulk-upload-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:16px;}
  .bulk-upload-desc{font-size:11.5px;color:var(--muted-foreground);line-height:1.6;margin:0 0 12px;}
  .bulk-upload-actions{display:flex;gap:10px;flex-wrap:wrap;}
  .bulk-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:5px;font-size:12px;
    font-weight:800;white-space:nowrap;transition:all .15s;border:1px solid var(--border);}
  .bulk-btn-secondary{background:#fff;color:#5a4a3a;}
  .bulk-btn-secondary:hover{border-color:var(--primary);color:var(--primary);}
  .bulk-btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);}
  .bulk-btn-primary:hover:not(:disabled){background:#3a2010;}
  .bulk-btn-primary:disabled{opacity:.55;cursor:wait;}
  .bulk-result{margin-top:12px;padding:10px 12px;border-radius:5px;font-size:11.5px;line-height:1.6;}
  .bulk-result p{display:flex;align-items:center;gap:6px;margin:0;}
  .bulk-result-ok{background:#F0F8F1;color:#2C6B3F;}
  .bulk-result-error{background:#FCEDEB;color:#C0392B;}
  .bulk-result-sub{margin-top:4px !important;color:#5a6b5f;padding-left:18px;}
  .bulk-result-warnings{margin:6px 0 0;padding-left:30px;color:#8a6a2a;}
  .bulk-result-warnings li{margin-top:2px;}

  .design-grid{display:grid;grid-template-columns:1fr;gap:12px;}
  .design-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px;
    display:flex;flex-direction:column;gap:12px;min-width:0;}
  .design-card-top{display:flex;gap:12px;align-items:flex-start;min-width:0;}
  .design-preview-box{flex-shrink:0;line-height:0;background:#fff;border-radius:4px;overflow:hidden;
    box-shadow:0 1px 4px rgba(28,16,7,.08);align-self:center;}
  .design-info{flex:1;min-width:0;}
  .design-title{font-size:12px;font-weight:800;}
  .design-meta{font-size:10px;color:var(--muted-foreground);margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .design-size-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .mini-num{display:flex;align-items:center;gap:5px;}
  .mini-num span{font-size:10px;color:#5a4a3a;}
  .mini-num input{width:52px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:10px;
    background:#FFFDF8;text-align:right;color:var(--foreground);}
  .mini-num input:focus{outline:none;border-color:var(--primary);}
  .mini-num .unit{color:var(--muted-foreground);width:12px;font-size:10px;}
  .design-actions{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;align-items:center;}
  .upload-label{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:4px;font-size:10px;

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

/* ═══════════════════════ Constants ═══════════════════════ */

const SCREEN_SCALE = 3.15;
const PRODUCT_DB_URL = "https://hare-allergen-default-rtdb.asia-southeast1.firebasedatabase.app/products.json";
const PRODUCT_DB_BASE_URL = "https://hare-allergen-default-rtdb.asia-southeast1.firebasedatabase.app/products";
const ORIGIN_DB_URL = "https://hare-allergen-default-rtdb.asia-southeast1.firebasedatabase.app/origins.json";
const ORIGIN_DB_BASE_URL = "https://hare-allergen-default-rtdb.asia-southeast1.firebasedatabase.app/origins";
// Manage-tab settings (fonts/sizes/colors/positions) — shared across every
// location so "변경 저장" makes the same look apply everywhere.
const SETTINGS_DB_URL = "https://hare-allergen-default-rtdb.asia-southeast1.firebasedatabase.app/showcard_settings.json";
// Uploaded card design images, stored ONE NODE PER CARD TYPE (not nested
// inside settings) so each type gets its own ~10MB Firebase node budget.
const DESIGNS_BASE_URL = "https://hare-allergen-default-rtdb.asia-southeast1.firebasedatabase.app/showcard_designs";
// Reusable saved show-card entries (제품명/설명/원산지/가격/알레르기 etc. as a set),
// listed in the "저장된 카드" tab and loadable straight into the print queue.
const SAVED_CARDS_BASE_URL = "https://hare-allergen-default-rtdb.asia-southeast1.firebasedatabase.app/showcard_saved";

// Matches the allergen field keys used by https://harebakery-cmd.github.io/hare-allergen/
// so products loaded from that source map 1:1 without translation.
const ALLERGENS = ["계란","우유","메밀","땅콩","대두","밀","고등어","게","새우","돼지고기","복숭아","토마토","아황산류","호두","닭고기","쇠고기","오징어","조개류","잣","꿀","한천","아몬드"];

function normalizeProductName(name) {
  return String(name || "").trim().replace(/\s+/g, " ");
}

function mergeLoadedProducts(list) {
  const byName = new Map();
  list.forEach(p => {
    const key = normalizeProductName(p.name).toLowerCase();
    if (!key) return;
    const current = byName.get(key);
    if (!current) {
      byName.set(key, { ...p, name: normalizeProductName(p.name) });
      return;
    }
    byName.set(key, {
      ...current,
      category: current.category || p.category || "",
      allergens: Array.from(new Set([...(current.allergens || []), ...(p.allergens || [])])),
      origin: current.origin && current.origin.length ? current.origin : (p.origin || []),
      price: current.price || p.price || "",
    });
  });
  return Array.from(byName.values());
}

const CARD_TYPE_LIST = [
  { id: "standard",   label: "표준" },
  { id: "small",      label: "작은사이즈" },
  { id: "cookie",     label: "쿠키사이즈" },
  { id: "no-origin",  label: "원산지 없는버전" },
  { id: "season",     label: "시즌 쇼카드" },
];

// Fixed (non-configurable) frame look, matching the reference EPS base design —
// a plain rectangle with a subtle chamfered corner and a small teal accent mark.
const FRAME_BORDER_COLOR = "#BC9272";
const FRAME_ACCENT_COLOR = "#9ED1D7";

const POSITION_FIELDS = [
  { key: "description", label: "제품 설명" },
  { key: "name",     label: "제품명" },
  { key: "origin",   label: "원산지 표기" },
  { key: "price",    label: "가격" },
  { key: "allergen", label: "하단 표기 (알레르기)" },
];

// Each field's box width as a % of the card width (used for text wrapping / centering).
const FIELD_BOX_META = {
  description: { width: 92 },
  name:        { width: 94 },
  origin:      { width: 56 },
  price:       { width: 42 },
  allergen:    { width: 94 },
};

// Default absolute positions (x/y as % of card width/height, anchored at the
// text block's CENTER). Fully independent per field — no flex/flow layout —
// so nudging one field never shifts another.
const POSITION_PRESETS = {
  standard:   { description: { x: 50, y: 13 }, name: { x: 50, y: 29 }, origin: { x: 34, y: 63 }, price: { x: 79, y: 57 }, allergen: { x: 50, y: 90 } },
  small:      { description: { x: 50, y: 14 }, name: { x: 50, y: 30 }, origin: { x: 34, y: 64 }, price: { x: 79, y: 57 }, allergen: { x: 50, y: 90 } },
  cookie:     { description: { x: 50, y: 11 }, name: { x: 50, y: 32 }, origin: { x: 50, y: 66 }, price: { x: 50, y: 79 }, allergen: { x: 50, y: 92 } },
  "no-origin":{ description: { x: 50, y: 15 }, name: { x: 50, y: 34 }, origin: { x: 34, y: 64 }, price: { x: 79, y: 57 }, allergen: { x: 50, y: 90 } },
  season:     { description: { x: 50, y: 12 }, name: { x: 50, y: 27 }, origin: { x: 34, y: 60 }, price: { x: 79, y: 54 }, allergen: { x: 50, y: 88 } },
};

const DEFAULT_SETTINGS = {
  sizes: {
    standard:   { width: 90, height: 60 },
    small:      { width: 85, height: 48 },
    cookie:     { width: 60, height: 60 },
    "no-origin":{ width: 90, height: 55 },
    season:     { width: 90, height: 70 },
  },
  fonts: { descriptionSize: 7, nameSize: 15, originSize: 7, priceSize: 17, allergenSize: 5.5 },
  lineHeights: { description: 1.3, name: 1.15, origin: 1.28, price: 1, allergen: 1.4 },
  fontFamilies: { description: null, name: null, origin: null, price: null, allergen: null },
  customFonts: [],
  descriptionColor: "#8a7a6a",
  nameColor: "#231916",
  priceColor: "#C9926B",
  originColor: "#595757",
  allergenColor: "#888070",
  positions: Object.fromEntries(
    CARD_TYPE_LIST.map(t => [t.id, JSON.parse(JSON.stringify(POSITION_PRESETS[t.id]))])
  ),
};

const DEFAULT_DESIGNS = Object.fromEntries(
  CARD_TYPE_LIST.map(t => [t.id, { image: null, fileKind: null, fileName: "" }])
);

// Product name and price are intentionally identical across every type here —
// this gallery is for comparing card DESIGNS side by side, not sample content.
const SAMPLE_CARDS = {
  standard:   { id: "s", type: "standard",   name: "제품명", description: "제품 설명 예시", origin: "원산지 표기란입니다", price: "0,0", allergens: ["계란","우유","밀"], message: "" },
  small:      { id: "s", type: "small",      name: "제품명", description: "제품 설명 예시", origin: "원산지 표기란입니다", price: "0,0", allergens: ["밀"],              message: "" },
  cookie:     { id: "s", type: "cookie",     name: "제품명", description: "제품 설명 예시", origin: "원산지 표기란입니다", price: "0,0", allergens: ["호두"],             message: "" },
  "no-origin":{ id: "s", type: "no-origin",  name: "제품명", description: "제품 설명 예시", origin: "",                    price: "0,0", allergens: [],                   message: "안내 메시지 표기란입니다" },
  season:     { id: "s", type: "season",     name: "제품명", description: "제품 설명 예시", origin: "원산지 표기란입니다", price: "0,0", allergens: ["계란","우유","밀"], message: "" },
};

/* ═══════════════════════ Helpers ═══════════════════════ */

function mmToPx(mm, scale = SCREEN_SCALE) { return mm * scale; }
function ptToPx(pt, scale = SCREEN_SCALE) { return pt * 0.353 * scale; }
function getPos(settings, type, field) {
  const fallback = (POSITION_PRESETS[type] && POSITION_PRESETS[type][field]) || { x: 50, y: 50 };
  return (settings.positions && settings.positions[type] && settings.positions[type][field]) || fallback;
}
// Absolute placement style: left/top are % of the card's width/height, anchored
// at the box's own center — independent of every other field (no flow/flex).
function absPosStyle(settings, type, field) {
  const p = getPos(settings, type, field);
  const meta = FIELD_BOX_META[field] || { width: 90 };
  return {
    position: "absolute",
    left: `${p.x}%`,
    top: `${p.y}%`,
    transform: "translate(-50%, -50%)",
    width: `${meta.width}%`,
  };
}
function getAllergenLabels(ids) {
  return (ids || []).filter(Boolean).join(" · ") || "해당없음";
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
// 신제품 등록 시스템의 원산지 항목 표시용 (신규 병합 포맷 {text} / 구 포맷 {name,country} 모두 지원)
function originItemDisplay(o) {
  if (!o) return "";
  if (o.text) return o.text;
  if (o.name || o.country) return (o.name || "") + (o.country ? "(" + o.country + ")" : "");
  return "";
}
// 신제품의 원산지 순위를 쇼카드 원산지 입력란 형식(쉼표 구분)으로 변환
function originItemsToText(originArr) {
  return (originArr || [])
    .map(o => originItemDisplay(o))
    .filter(Boolean)
    .join(", ");
}

/* ═══════════════════ 엑셀 일괄 업로드 (관리 탭) ═══════════════════
   제품명 / 가격 / 원산지 1~6순위 / 알레르기 유발물질을 담은 엑셀 한 장으로
   products.json(제품명·가격·원산지·알레르기)과 origins.json(원산지 저장
   표기 목록)에 한 번에 반영한다. 신제품 등록 시스템과 같은 스키마
   (제품이름/판매금액/원산지[{rank,text}]/알레르기키=Yes|No)를 그대로 씀. */

const BULK_UPLOAD_MAX_ORIGIN_RANKS = 6;
const BULK_UPLOAD_HEADERS = {
  name: ["제품명", "제품이름"],
  price: ["가격", "금액", "판매금액"],
  allergen: ["알레르기 유발물질", "알레르기유발물질", "알레르기"],
};
function bulkOriginHeader(rank) { return `원산지 ${rank}순위`; }

// Builds and downloads the .xlsx template staff should fill in and re-upload.
function downloadBulkUploadTemplate() {
  const headers = [
    "제품명", "가격",
    ...Array.from({ length: BULK_UPLOAD_MAX_ORIGIN_RANKS }, (_, i) => bulkOriginHeader(i + 1)),
    "알레르기 유발물질",
  ];
  const sampleRows = [
    ["크로와상", 3500, "프랑스산 버터", "국산 밀가루", "", "", "", "", "우유,밀"],
    ["호밀빵", 4200, "호밀가루(미국산)", "", "", "", "", "", ""],
  ];
  const ws = XLSX.utils.aoa_to_sheet([headers, ...sampleRows]);
  ws["!cols"] = headers.map((_, i) => ({ wch: i === 0 ? 18 : i === 1 ? 8 : i < 2 + BULK_UPLOAD_MAX_ORIGIN_RANKS ? 20 : 28 }));

  // Reference sheet so staff can copy exact allergen spelling — matching
  // must be exact, since it maps 1:1 onto the fixed ALLERGENS key list.
  const allergenSheet = XLSX.utils.aoa_to_sheet([
    ["사용 가능한 알레르기 유발물질 이름 (정확히 이 표기를 쉼표로 구분해 입력)"],
    ...ALLERGENS.map(a => [a]),
  ]);
  allergenSheet["!cols"] = [{ wch: 40 }];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "제품 업로드 틀");
  XLSX.utils.book_append_sheet(wb, allergenSheet, "알레르기 표기 목록");
  XLSX.writeFile(wb, "쇼카드_제품_일괄업로드_틀.xlsx");
}

// Reads the uploaded workbook into structured rows, without touching Firebase.
async function parseBulkUploadFile(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array" });
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
  if (rows.length < 2) {
    throw new Error("데이터가 없습니다. 다운로드한 틀의 헤더 행 아래에 제품을 입력해주세요.");
  }
  const header = rows[0].map(h => String(h || "").trim());
  const findCol = (aliases) => {
    for (const a of aliases) {
      const idx = header.findIndex(h => h === a);
      if (idx !== -1) return idx;
    }
    return -1;
  };
  const nameIdx = findCol(BULK_UPLOAD_HEADERS.name);
  const priceIdx = findCol(BULK_UPLOAD_HEADERS.price);
  const allergenIdx = findCol(BULK_UPLOAD_HEADERS.allergen);
  const originIdxs = Array.from({ length: BULK_UPLOAD_MAX_ORIGIN_RANKS }, (_, i) =>
    header.findIndex(h => h === bulkOriginHeader(i + 1))
  );
  if (nameIdx === -1) {
    throw new Error('헤더에서 "제품명" 열을 찾을 수 없습니다. 다운로드한 틀의 헤더 행을 그대로 사용해주세요.');
  }

  const parsedRows = [];
  const skipped = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.every(c => String(c || "").trim() === "")) continue; // blank row
    const name = String(row[nameIdx] || "").trim();
    if (!name) { skipped.push({ row: i + 1, reason: "제품명이 비어 있습니다" }); continue; }

    const priceRaw = priceIdx !== -1 ? String(row[priceIdx] || "").trim() : "";
    const priceNum = priceRaw ? Number(priceRaw.replace(/[^0-9.]/g, "")) : NaN;

    const originTexts = originIdxs
      .map(idx => (idx !== -1 ? String(row[idx] || "").trim() : ""))
      .filter(Boolean);

    const allergenRaw = allergenIdx !== -1 ? String(row[allergenIdx] || "") : "";
    const allergenNames = allergenRaw.split(/[,、，\n]/).map(s => s.trim()).filter(Boolean);
    const matchedAllergens = allergenNames.filter(a => ALLERGENS.includes(a));
    const unknownAllergens = allergenNames.filter(a => !ALLERGENS.includes(a));

    parsedRows.push({
      row: i + 1,
      name,
      price: Number.isFinite(priceNum) && priceNum > 0 ? priceNum : null,
      originTexts,
      matchedAllergens,
      unknownAllergens,
    });
  }
  return { parsedRows, skipped };
}

// Writes parsed rows to Firebase: creates/updates each product (matched to an
// existing product by exact name) and adds any new origin phrases to the
// shared origins list. Runs after the person confirms the parsed summary.
async function applyBulkUpload(parsedRows) {
  const [productsSnap, originsSnap] = await Promise.all([
    fetch(PRODUCT_DB_URL).then(r => r.json()).catch(() => ({})),
    fetch(ORIGIN_DB_URL).then(r => r.json()).catch(() => ({})),
  ]);

  const nameToKey = new Map();
  Object.entries(productsSnap || {}).forEach(([key, p]) => {
    if (p && p["제품이름"]) nameToKey.set(String(p["제품이름"]).trim(), key);
  });
  const existingOrigins = new Set(Object.values(originsSnap || {}).filter(Boolean));

  let created = 0, updated = 0, priceSkipped = 0;
  const allergenWarnings = [];
  const originsToAdd = new Set();

  for (const row of parsedRows) {
    const originArr = row.originTexts.map((t, i) => ({ rank: i + 1, text: t }));
    row.originTexts.forEach(t => { if (!existingOrigins.has(t)) originsToAdd.add(t); });
    if (row.unknownAllergens.length > 0) {
      allergenWarnings.push(`${row.row}행 "${row.name}": 인식 안 된 알레르기 → ${row.unknownAllergens.join(", ")}`);
    }
    if (row.price == null) priceSkipped++;

    const update = { 제품이름: row.name, 원산지: originArr };
    if (row.price != null) update.판매금액 = row.price;
    ALLERGENS.forEach(a => { update[a] = row.matchedAllergens.includes(a) ? "Yes" : "No"; });

    const existingKey = nameToKey.get(row.name);
    if (existingKey) {
      await fetch(`${PRODUCT_DB_BASE_URL}/${existingKey}.json`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(update),
      });
      updated++;
    } else {
      const newId = "bulk_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7);
      await fetch(`${PRODUCT_DB_BASE_URL}/${newId}.json`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ _id: newId, _newProduct: true, 등록상태: "신제품", ...update }),
      });
      nameToKey.set(row.name, newId);
      created++;
    }
  }

  await Promise.all(
    Array.from(originsToAdd).map(v =>
      fetch(ORIGIN_DB_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(v),
      })
    )
  );

  return { created, updated, priceSkipped, allergenWarnings, originsAdded: originsToAdd.size };
}

// Resolve the CSS font-family string for a given text field ("name" | "origin" | "price" | "allergen")
// based on the user-uploaded TTF fonts registered in settings.customFonts.
function resolveFontFamily(fieldKey, settings) {
  const id = settings.fontFamilies && settings.fontFamilies[fieldKey];
  if (!id) return "inherit";
  const cf = (settings.customFonts || []).find(f => f.id === id);
  return cf ? `'${cf.family}'` : "inherit";
}

// Loads a TTF file the user uploads as a real web font (via the FontFace API),
// registers it in settings.customFonts, and assigns it to the given field.
// Also keeps a base64 copy (dataUrl) so the font can be restored after a
// page reload / on another computer once "변경 저장" persists it to Firebase.
async function uploadCustomFont(file, fieldKey, setSettings) {
  try {
    const buf = await file.arrayBuffer();
    const family = "CF" + uid();
    const face = new FontFace(family, buf);
    await face.load();
    document.fonts.add(face);
    const dataUrl = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = () => rej(new Error("read failed"));
      r.readAsDataURL(file);
    });
    const id = uid();
    const label = file.name.replace(/\.[^.]+$/, "");
    setSettings(s => ({
      ...s,
      customFonts: [...(s.customFonts || []), { id, label, family, dataUrl }],
      fontFamilies: { ...s.fontFamilies, [fieldKey]: id },
    }));
  } catch (err) {
    console.error(err);
    alert("폰트를 불러오지 못했습니다. TTF 파일인지 확인해 주세요.");
  }
}

// Re-registers every saved custom font as a real FontFace after settings are
// loaded from Firebase (a fresh page load has no in-memory fonts otherwise).
async function hydrateCustomFonts(customFonts) {
  for (const cf of customFonts || []) {
    if (!cf.dataUrl || !cf.family) continue;
    try {
      const res = await fetch(cf.dataUrl);
      const buf = await res.arrayBuffer();
      const face = new FontFace(cf.family, buf);
      await face.load();
      document.fonts.add(face);
    } catch (err) {
      console.error("font hydrate failed", cf.label, err);
    }
  }
}

// Merges settings loaded from Firebase over DEFAULT_SETTINGS so any field
// added in a later app update (that an old saved record doesn't have yet)
// still falls back safely instead of crashing the UI.
function mergeSettings(loaded) {
  if (!loaded) return DEFAULT_SETTINGS;
  return {
    ...DEFAULT_SETTINGS,
    ...loaded,
    sizes: { ...DEFAULT_SETTINGS.sizes, ...(loaded.sizes || {}) },
    fonts: { ...DEFAULT_SETTINGS.fonts, ...(loaded.fonts || {}) },
    lineHeights: { ...DEFAULT_SETTINGS.lineHeights, ...(loaded.lineHeights || {}) },
    fontFamilies: { ...DEFAULT_SETTINGS.fontFamilies, ...(loaded.fontFamilies || {}) },
    customFonts: loaded.customFonts || [],
    positions: Object.fromEntries(CARD_TYPE_LIST.map(t =>
      [t.id, { ...POSITION_PRESETS[t.id], ...((loaded.positions || {})[t.id] || {}) }])),
  };
}

// Simple rectangle frame with a subtle chamfered corner and a small accent mark
// at the top-left / bottom-right corners — matches the reference EPS base design.
// Always a rectangle (no octagon-style deep corner cutting).
function CardFrame({ w, h, sw = 1.2 }) {
  const chamfer = Math.max(4, Math.min(w, h) * 0.045);
  const ca = chamfer * 0.62;
  const pts = `${chamfer},0 ${w - chamfer},0 ${w},${chamfer} ${w},${h - chamfer} ${w - chamfer},${h} ${chamfer},${h} 0,${h - chamfer} 0,${chamfer}`;
  return (
    <svg width={w} height={h} style={{ position: "absolute", top: 0, left: 0, pointerEvents: "none", overflow: "visible" }}>
      <polygon points={pts} fill="none" stroke={FRAME_BORDER_COLOR} strokeWidth={sw} />
      <line x1={chamfer - ca * 0.6} y1={ca * 0.6} x2={ca * 0.6} y2={chamfer - ca * 0.6} stroke={FRAME_ACCENT_COLOR} strokeWidth={sw * 1.7} strokeLinecap="round" />
      <line x1={w - chamfer + ca * 0.6} y1={h - ca * 0.6} x2={w - ca * 0.6} y2={h - chamfer + ca * 0.6} stroke={FRAME_ACCENT_COLOR} strokeWidth={sw * 1.7} strokeLinecap="round" />
    </svg>
  );
}

function formatWon(n) { return n.toLocaleString("ko-KR"); }
function parsePriceNumber(price) {
  const raw = String(price || "").trim();
  const compact = raw.match(/^([0-9]+),([0-9])$/);
  if (compact) return parseInt(compact[1], 10) * 1000 + parseInt(compact[2], 10) * 100;
  const digits = raw.replace(/[^0-9]/g, "");
  return digits ? parseInt(digits, 10) : NaN;
}
function formatPriceText(price) {
  const raw = String(price || "").trim();
  const n = parsePriceNumber(raw);
  if (isNaN(n)) return raw;
  if (n > 0 && n % 100 === 0) return `${Math.floor(n / 1000)},${Math.floor((n % 1000) / 100)}`;
  return formatWon(n);
}
function splitTopLevelList(value) {
  const s = String(value || "");
  const parts = [];
  let cur = "";
  let depth = 0;
  for (const ch of s) {
    if (ch === "(" || ch === "[" || ch === "{") depth++;
    else if (ch === ")" || ch === "]" || ch === "}") depth = Math.max(0, depth - 1);
    if ((ch === "," || ch === "\n" || ch === "\r") && depth === 0) {
      if (cur.trim()) parts.push(cur.trim());
      cur = "";
    } else {
      cur += ch;
    }
  }
  if (cur.trim()) parts.push(cur.trim());
  return parts.filter(Boolean);
}
function formatOriginText(value) {
  return splitTopLevelList(value).join(", ");
}

// Renders either a plain price, or — when a discount % is set — a small red
// discount badge + strikethrough original price + bold discounted price.
function PriceBlock({ price, discountPercent, priceColor, priceFamily, priceSize, priceLineHeight, px }) {
  const original = parsePriceNumber(price);
  const hasDiscount = discountPercent > 0 && !isNaN(original) && original > 0;

  if (!hasDiscount) {
    return (
      <div style={{ fontFamily: priceFamily, fontSize: px(priceSize), fontWeight: 900, color: priceColor, textAlign: "center", lineHeight: priceLineHeight, whiteSpace: "nowrap" }}>
        {formatPriceText(price) || "—"}
      </div>
    );
  }

  const discounted = Math.round(original * (100 - discountPercent) / 100);
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: px(priceSize) * 0.08 }}>
      <span style={{ fontFamily: priceFamily, fontSize: px(priceSize) * 0.4, fontWeight: 800, color: "#D64545", lineHeight: priceLineHeight, whiteSpace: "nowrap" }}>
        {discountPercent}%할인
      </span>
      <span style={{ fontFamily: priceFamily, fontSize: px(priceSize) * 0.52, fontWeight: 700, color: "#a89a8d", lineHeight: priceLineHeight,
        textDecoration: "line-through", textDecorationColor: "#D64545", textDecorationThickness: "1.5px", whiteSpace: "nowrap" }}>
        {formatPriceText(original)}
      </span>
      <span style={{ fontFamily: priceFamily, fontSize: px(priceSize), fontWeight: 900, color: priceColor, lineHeight: priceLineHeight, whiteSpace: "nowrap" }}>
        {formatPriceText(discounted)}
      </span>
    </div>
  );
}

// `custom` = true when a user-uploaded design image is behind this overlay;

function CardTextOverlay({ card, settings, px, custom }) {

  const originText = showOrigin && card.origin ? formatOriginText(card.origin) : card.message ? card.message : "";
  const descriptionFamily = resolveFontFamily("description", settings);
  const nameFamily = resolveFontFamily("name", settings);
  const originFamily = resolveFontFamily("origin", settings);

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "visible" }}>

      </div>

          borderTop: custom ? "none" : "0.5px solid #e0d8cc", paddingTop: custom ? 0 : px(f.allergenSize) * 0.5, minHeight: allergenText ? undefined : px(f.allergenSize) * lh.allergen }}>

function DesignAndSizeCard({ type, label, settings, setSettings, designs, setDesigns }) {
  const [busy, setBusy] = useState(false);
  const fileInputRef = useRef(null);
  const size = settings.sizes[type];
  const design = designs[type];
  const sample = SAMPLE_CARDS[type];

  function updateSize(key, val) {
    setSettings(s => ({ ...s, sizes: { ...s.sizes, [type]: { ...s.sizes[type], [key]: val } } }));
  }
  function setDesign(patch) {
    setDesigns(d => ({ ...d, [type]: { ...d[type], ...patch } }));
  }

  async function handleFile(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setBusy(true);
    try {
      const isPdf = file.type === "application/pdf" || /\.pdf$/i.test(file.name);
      if (isPdf) {
        const buf = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
        const page = await pdf.getPage(1);
        const base = page.getViewport({ scale: 1 });
        // Render at a high scale for print-quality output (~ roughly 300dpi+ at target mm size)
        const targetPxWidth = mmToPx(size.width, 3.78 * 3.2);
        const renderScale = Math.max(6, targetPxWidth / base.width);
        const viewport = page.getViewport({ scale: renderScale });
        const canvas = document.createElement("canvas");
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext("2d");
        await page.render({ canvasContext: ctx, viewport }).promise;
        setDesign({ image: canvas.toDataURL("image/png", 1.0), fileKind: "pdf", fileName: file.name });
      } else {
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        const kind = /\.svg$/i.test(file.name) || file.type === "image/svg+xml" ? "svg" : "raster";
        setDesign({ image: dataUrl, fileKind: kind, fileName: file.name });
      }

  function resetDesign() {

          <p className="design-meta">
            {type === "no-origin" ? "원산지 표기 없음" : type === "season" ? "시즌 특별 디자인" :
             type === "cookie" ? "정방형 소형 카드" : type === "small" ? "컴팩트 사이즈" : "기본 표준 카드"}

          <div className="design-size-row">
            <label className="mini-num">

            </label>
            <label className="mini-num">
              <span>세로</span>
              <input type="number" min={20} max={200} step={1} value={size.height}

          <div className="design-actions">
            <label className="upload-label">

            {design.image && (
              <button className="btn-ghost-sm" onClick={resetDesign} disabled={busy}>

          <p className="design-hint">

            업로드한 디자인은 위에서 설정한 가로×세로 사이즈에 맞춰 출력됩니다.
          </p>
        </div>
      </div>

      <div className="position-section">
        <p className="position-section-title">텍스트 위치 조정 (%) <span>— 입력창 클릭 후 키보드 화살표로도 이동 가능 · 각 항목은 서로 영향 없이 독립적으로 움직입니다</span></p>
        <div className="position-grid">
          {POSITION_FIELDS.map(({ key, label: fLabel }) => (
            <PositionControl key={key} label={fLabel} pos={getPos(settings, type, key)} defaultPos={POSITION_PRESETS[type][key]}
              onChange={(pos) => setSettings(s => ({ ...s, positions: { ...s.positions, [type]: { ...s.positions[type], [key]: pos } } }))} />
          ))}
        </div>
      </div>
    </div>
  );
}

function PositionControl({ label, pos, defaultPos, onChange }) {
  const step = 1;
  function clamp(v) { return Math.max(0, Math.min(100, v)); }
  function nudge(dx, dy) {
    const nx = clamp(Math.round((pos.x + dx * step) * 10) / 10);
    const ny = clamp(Math.round((pos.y + dy * step) * 10) / 10);
    onChange({ x: nx, y: ny });
  }
  function handleKeyDown(e) {
    const map = { ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0] };
    if (map[e.key]) {
      e.preventDefault();
      nudge(map[e.key][0], map[e.key][1]);
    }
  }
  const moved = pos.x !== defaultPos.x || pos.y !== defaultPos.y;
  return (
    <div className="position-control" onKeyDown={handleKeyDown}>
      <div className="position-control-head">
        <span>{label}</span>
        {moved && <button className="pos-reset" onClick={() => onChange({ ...defaultPos })}>초기화</button>}
      </div>
      <div className="position-control-body">
        <div className="pos-xy">
          <label>
            <span>X</span>
            <input type="number" min={0} max={100} step={1} value={pos.x} onChange={(e) => onChange({ ...pos, x: clamp(Number(e.target.value) || 0) })} />
          </label>
          <label>
            <span>Y</span>
            <input type="number" min={0} max={100} step={1} value={pos.y} onChange={(e) => onChange({ ...pos, y: clamp(Number(e.target.value) || 0) })} />
          </label>
        </div>
        <div className="pos-arrows">
          <button tabIndex={-1} className="pos-arrow up" onClick={() => nudge(0, -1)}><IconChevronUp size={11} /></button>
          <button tabIndex={-1} className="pos-arrow left" onClick={() => nudge(-1, 0)}><IconChevronLeft size={11} /></button>
          <button tabIndex={-1} className="pos-arrow down" onClick={() => nudge(0, 1)}><IconChevronDown size={11} /></button>
          <button tabIndex={-1} className="pos-arrow right" onClick={() => nudge(1, 0)}><IconChevronRight size={11} /></button>
        </div>
      </div>
    </div>
  );
}

function NumberInput({ label, value, onChange, min, max, step = 0.5, unit = "" }) {

}

function FontFieldRow({ label, fieldKey, settings, setSettings }) {
  const currentId = settings.fontFamilies[fieldKey] || "default";
  const [busy, setBusy] = useState(false);

  async function handleUpload(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setBusy(true);
    try {
      await uploadCustomFont(file, fieldKey, setSettings);
    } finally {
      setBusy(false);
    }
  }

  function handleSelect(e) {
    const v = e.target.value;
    setSettings(s => ({ ...s, fontFamilies: { ...s.fontFamilies, [fieldKey]: v === "default" ? null : v } }));
  }

  return (
    <div className="font-field-row">
      <span>{label}</span>
      <div className="font-field-controls">
        <select value={currentId} onChange={handleSelect}>
          <option value="default">기본</option>
          {(settings.customFonts || []).map(f => <option key={f.id} value={f.id}>{f.label}</option>)}
        </select>
        <label className="upload-label-sm">
          <IconUpload size={10} /> {busy ? "..." : "TTF"}
          <input type="file" accept=".ttf,font/ttf,font/sfnt" disabled={busy} onChange={handleUpload} />
        </label>
      </div>
    </div>
  );
}

function ManageTab({ settings, setSettings, designs, setDesigns, onSave, saving, savedAt, error, loaded, reloadProducts, reloadOrigins }) {
  function updateFont(key, val) {
    setSettings(s => ({ ...s, fonts: { ...s.fonts, [key]: val } }));
  }
  function updateLineHeight(key, val) {
    setSettings(s => ({ ...s, lineHeights: { ...(s.lineHeights || DEFAULT_SETTINGS.lineHeights), [key]: val } }));
  }

  const [bulkStatus, setBulkStatus] = useState("idle"); // idle | parsing | uploading | done | error
  const [bulkResult, setBulkResult] = useState(null);
  const [bulkError, setBulkError] = useState(null);
  const bulkFileInputRef = useRef(null);

  async function handleBulkFile(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setBulkStatus("parsing");
    setBulkError(null);
    setBulkResult(null);
    try {
      const { parsedRows, skipped } = await parseBulkUploadFile(file);
      if (parsedRows.length === 0) {
        throw new Error("업로드할 수 있는 행이 없습니다. 제품명이 채워진 행이 있는지 확인해주세요.");
      }
      const confirmMsg =
        `총 ${parsedRows.length}개 제품을 업로드합니다` +
        (skipped.length > 0 ? ` (제품명이 비어 건너뛴 행 ${skipped.length}개 있음)` : "") +
        `.\n제품명·원산지·가격·알레르기가 저장되고, 원산지는 "저장된 표기" 목록에도 추가됩니다.\n계속할까요?`;
      if (!window.confirm(confirmMsg)) {
        setBulkStatus("idle");
        e.target.value = "";
        return;
      }
      setBulkStatus("uploading");
      const result = await applyBulkUpload(parsedRows);
      setBulkResult({ ...result, skipped, totalRows: parsedRows.length });
      setBulkStatus("done");
      reloadProducts && reloadProducts();
      reloadOrigins && reloadOrigins();
    } catch (err) {
      setBulkError(err.message || "업로드 중 오류가 발생했습니다");
      setBulkStatus("error");
    } finally {
      e.target.value = "";
    }
  }

  return (
    <div className="manage-wrap">
      <div className="manage-savebar">
        <div className="manage-savebar-info">
          {!loaded ? (
            <span className="manage-savebar-status"><IconRefresh size={12} className="spin" /> 저장된 설정 불러오는 중...</span>
          ) : error ? (
            <span className="manage-savebar-status error"><IconAlert size={12} /> {error}</span>
          ) : savedAt ? (
            <span className="manage-savebar-status ok"><IconCheck size={12} /> {new Date(savedAt).toLocaleString("ko-KR")} 저장됨 — 모든 지점에 동일하게 반영됩니다</span>
          ) : (
            <span className="manage-savebar-status">업로드한 디자인 · 폰트 · 색상 · 위치는 "변경 저장"을 눌러야 고정되고, 모든 지점 화면에 반영됩니다.</span>
          )}
        </div>
        <button className="manage-save-btn" onClick={onSave} disabled={saving || !loaded}>
          <IconSave size={13} /> {saving ? "저장 중..." : "변경 저장"}
        </button>
      </div>

      <section className="manage-bulk-section">
        <div className="manage-section-head">
          <IconUpload size={15} style={{ color: "#B5762A" }} />
          <h2>제품 엑셀 일괄 업로드</h2>
          <span className="sub">— 제품명 · 가격 · 원산지 1~6순위 · 알레르기 유발물질을 엑셀로 한 번에 저장하세요</span>
        </div>
        <div className="bulk-upload-card">
          <p className="bulk-upload-desc">
            틀을 내려받아 제품명 / 가격 / 원산지 순위(최소 1개, 최대 6개) / 알레르기 유발물질을 채운 뒤 업로드하면,
            제품 목록("알레르기 자료에서 자동 불러오기")과 "저장된 표기" 원산지 목록에 한 번에 반영됩니다.
            이미 있는 제품명과 같으면 새로 만들지 않고 해당 제품 정보가 갱신됩니다.
          </p>
          <div className="bulk-upload-actions">
            <button type="button" className="bulk-btn bulk-btn-secondary" onClick={downloadBulkUploadTemplate}>
              <IconDownload size={13} /> 엑셀 틀 다운로드
            </button>
            <button type="button" className="bulk-btn bulk-btn-primary" disabled={bulkStatus === "parsing" || bulkStatus === "uploading"}
              onClick={() => bulkFileInputRef.current && bulkFileInputRef.current.click()}>
              {bulkStatus === "parsing" ? (<><IconRefresh size={13} className="spin" /> 파일 읽는 중...</>)
                : bulkStatus === "uploading" ? (<><IconRefresh size={13} className="spin" /> 업로드 중...</>)
                : (<><IconUpload size={13} /> 엑셀 업로드</>)}
            </button>
            <input ref={bulkFileInputRef} type="file" accept=".xlsx,.xls,.csv" style={{ display: "none" }} onChange={handleBulkFile} />
          </div>

          {bulkStatus === "error" && bulkError && (
            <p className="bulk-result bulk-result-error"><IconAlert size={12} /> {bulkError}</p>
          )}

          {bulkStatus === "done" && bulkResult && (
            <div className="bulk-result bulk-result-ok">
              <p><IconCheck size={12} /> 업로드 완료 — 신규 {bulkResult.created}건 · 갱신 {bulkResult.updated}건 · 원산지 새 표기 {bulkResult.originsAdded}건 저장됨</p>
              {bulkResult.priceSkipped > 0 && (
                <p className="bulk-result-sub">가격이 비어 있거나 인식되지 않아 건너뛴 제품 {bulkResult.priceSkipped}건 (기존 가격 유지)</p>
              )}
              {bulkResult.skipped && bulkResult.skipped.length > 0 && (
                <p className="bulk-result-sub">제품명이 없어 건너뛴 행: {bulkResult.skipped.map(s => s.row).join(", ")}</p>
              )}
              {bulkResult.allergenWarnings && bulkResult.allergenWarnings.length > 0 && (
                <ul className="bulk-result-warnings">
                  {bulkResult.allergenWarnings.map((w, i) => <li key={i}>{w}</li>)}
                </ul>
              )}
            </div>
          )}
        </div>
      </section>

      <div className="manage-columns">
        <section className="manage-col-left">
          <div className="manage-section-head">
            <IconImage size={15} style={{ color: "#B5762A" }} />
            <h2>카드 종류별 디자인 &amp; 사이즈</h2>
            <span className="sub">— 직접 만든 디자인을 업로드하고, 같은 곳에서 사이즈까지 설정하세요</span>
          </div>
          <div className="design-grid">
            {CARD_TYPE_LIST.map(({ id, label }) => (
              <DesignAndSizeCard key={id} type={id} label={label} settings={settings} setSettings={setSettings}
                designs={designs} setDesigns={setDesigns} />
            ))}
          </div>
        </section>

        <section className="manage-col-right">
          <div className="manage-section-head">
            <IconSettings size={15} style={{ color: "#B5762A" }} />
            <h2>폰트 사이즈 &amp; 색상</h2>
            <span className="sub">— 항목별로 크기·폰트(TTF 업로드)·색상을 따로 지정할 수 있어요. 카드는 항상 사각형으로 출력됩니다</span>
          </div>
          <div className="settings-card">
            <div className="field-group">
              <p className="field-group-title">제품 설명</p>
              <NumberInput label="크기" value={settings.fonts.descriptionSize} onChange={(v) => updateFont("descriptionSize", v)} min={4} max={14} step={0.5} unit="pt" />
              <NumberInput label="줄간격" value={(settings.lineHeights || DEFAULT_SETTINGS.lineHeights).description} onChange={(v) => updateLineHeight("description", v)} min={0.8} max={2} step={0.05} unit="배" />
              <FontFieldRow label="폰트" fieldKey="description" settings={settings} setSettings={setSettings} />
              <ColorInput label="글자 색상" value={settings.descriptionColor} onChange={(v) => setSettings(s => ({ ...s, descriptionColor: v }))} />
            </div>
            <div className="field-group">
              <p className="field-group-title">제품명</p>
              <NumberInput label="크기" value={settings.fonts.nameSize} onChange={(v) => updateFont("nameSize", v)} min={8} max={30} step={0.5} unit="pt" />
              <NumberInput label="줄간격" value={(settings.lineHeights || DEFAULT_SETTINGS.lineHeights).name} onChange={(v) => updateLineHeight("name", v)} min={0.8} max={2} step={0.05} unit="배" />
              <FontFieldRow label="폰트" fieldKey="name" settings={settings} setSettings={setSettings} />
              <ColorInput label="글자 색상" value={settings.nameColor} onChange={(v) => setSettings(s => ({ ...s, nameColor: v }))} />
            </div>
            <div className="field-group">
              <p className="field-group-title">원산지</p>
              <NumberInput label="크기" value={settings.fonts.originSize} onChange={(v) => updateFont("originSize", v)} min={4} max={14} step={0.5} unit="pt" />
              <NumberInput label="줄간격" value={(settings.lineHeights || DEFAULT_SETTINGS.lineHeights).origin} onChange={(v) => updateLineHeight("origin", v)} min={0.8} max={2} step={0.05} unit="배" />
              <FontFieldRow label="폰트" fieldKey="origin" settings={settings} setSettings={setSettings} />

            </div>
            <div className="field-group">
              <p className="field-group-title">가격</p>
              <NumberInput label="크기" value={settings.fonts.priceSize} onChange={(v) => updateFont("priceSize", v)} min={8} max={30} step={0.5} unit="pt" />
              <NumberInput label="줄간격" value={(settings.lineHeights || DEFAULT_SETTINGS.lineHeights).price} onChange={(v) => updateLineHeight("price", v)} min={0.8} max={2} step={0.05} unit="배" />
              <FontFieldRow label="폰트" fieldKey="price" settings={settings} setSettings={setSettings} />
              <ColorInput label="글자 색상" value={settings.priceColor} onChange={(v) => setSettings(s => ({ ...s, priceColor: v }))} />
            </div>
            <div className="field-group">
              <p className="field-group-title">알레르기 유발물질</p>
              <NumberInput label="크기" value={settings.fonts.allergenSize} onChange={(v) => updateFont("allergenSize", v)} min={4} max={12} step={0.5} unit="pt" />
              <NumberInput label="줄간격" value={(settings.lineHeights || DEFAULT_SETTINGS.lineHeights).allergen} onChange={(v) => updateLineHeight("allergen", v)} min={0.8} max={2} step={0.05} unit="배" />
              <FontFieldRow label="폰트" fieldKey="allergen" settings={settings} setSettings={setSettings} />
              <ColorInput label="글자 색상" value={settings.allergenColor} onChange={(v) => setSettings(s => ({ ...s, allergenColor: v }))} />
            </div>
          </div>

          <button className="reset-all-btn" onClick={() => setSettings(DEFAULT_SETTINGS)}>
            <IconRefresh size={11} /> 기본값으로 초기화
          </button>
        </section>
      </div>
    </div>
  );
}

function App() {
  const [mainTab, setMainTab] = useState("print");
  const [cardType, setCardType] = useState("standard");
  const [name, setName] = useState("");
  const [description, setDescription] = useState("");
  const [origin, setOrigin] = useState("");
  const [price, setPrice] = useState("");
  const [discountOpen, setDiscountOpen] = useState(false);
  const [discountPercent, setDiscountPercent] = useState("");
  const [message, setMessage] = useState("");
  const [allergens, setAllergens] = useState([]);
  const [queue, setQueue] = useState([]);
  const [rightTab, setRightTab] = useState("preview");
  const [previewDark, setPreviewDark] = useState(false);
  const [dbOpen, setDbOpen] = useState(false);
  const [dbSearch, setDbSearch] = useState("");
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [designs, setDesigns] = useState(DEFAULT_DESIGNS);
  const [manageLoaded, setManageLoaded] = useState(false);
  const [manageSaving, setManageSaving] = useState(false);
  const [manageSavedAt, setManageSavedAt] = useState(null);
  const [manageError, setManageError] = useState(null);

  const [savedCards, setSavedCards] = useState([]);
  const [savedCardsLoading, setSavedCardsLoading] = useState(false);
  const [savingCard, setSavingCard] = useState(false);

  // Load the shared manage-tab settings + uploaded designs from Firebase once
  // on startup (falls back to the built-in defaults if nothing saved yet).
  useEffect(() => {
    (async () => {
      try {
        const [sRes, dRes] = await Promise.all([fetch(SETTINGS_DB_URL), fetch(DESIGNS_BASE_URL + ".json")]);
        const sData = sRes.ok ? await sRes.json() : null;
        const dData = dRes.ok ? await dRes.json() : null;
        if (sData) {
          setSettings(mergeSettings(sData));
          if (sData.customFonts && sData.customFonts.length) hydrateCustomFonts(sData.customFonts);
        }
        if (dData) setDesigns(prev => ({ ...DEFAULT_DESIGNS, ...dData }));
      } catch (err) {
        console.error("manage settings load failed", err);
      } finally {
        setManageLoaded(true);
      }
    })();
  }, []);

  // "변경 저장" — persists fonts/sizes/colors/positions + every uploaded design
  // image to Firebase so the look is fixed and shared across every computer.
  async function saveManageChanges() {
    setManageSaving(true);
    setManageError(null);
    try {
      await fetch(SETTINGS_DB_URL, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(settings) });
      await Promise.all(CARD_TYPE_LIST.map(t => {
        const d = designs[t.id];
        const payload = d && d.image ? d : null;
        return fetch(`${DESIGNS_BASE_URL}/${t.id}.json`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      }));
      setManageSavedAt(Date.now());
    } catch (err) {
      console.error(err);

  function loadSavedCards() {

  // separate from "인쇄 목록에 추가", which only adds to today's print batch.
  async function saveCardToLibrary() {

    try {
      const res = await fetch(SAVED_CARDS_BASE_URL + ".json", {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(record),

      const data = await res.json();
      setSavedCards(prev => [{ ...record, id: data.name }, ...prev]);
      saveOriginIfNew(normalizedOrigin);
    } catch (err) {
      alert("카드 저장에 실패했습니다.");
    } finally {
      setSavingCard(false);
    }
  }

    setOrigin(saved.origin || ""); setPrice(saved.price || ""); setAllergens(saved.allergens || []);
    setMessage(saved.message || ""); setDiscountPercent(saved.discountPercent ? String(saved.discountPercent) : "");
    setDiscountOpen(!!saved.discountPercent);

  const [products, setProducts] = useState([]);

  // originEntries keeps each saved origin phrase together with its Firebase
  // key (origins/{key}) so a single entry can be deleted with the ✕ button
  // without wiping out the others. originList (derived, deduped) is what
  // the combobox actually searches/displays.
  const [originEntries, setOriginEntries] = useState([]); // [{key, value}]
  const originList = useMemo(() => {
    const values = originEntries.map(e => e.value).filter(Boolean);
    return Array.from(new Set(values)).sort((a, b) => a.localeCompare(b, "ko"));
  }, [originEntries]);
  const [originListLoading, setOriginListLoading] = useState(false);
  const [originOpen, setOriginOpen] = useState(false);
  const originSavedRef = useRef(new Set());

  function loadOrigins() {
    setOriginListLoading(true);
    fetch(ORIGIN_DB_URL)
      .then(r => r.json())
      .then(data => {
        const entries = Object.entries(data || {})
          .map(([key, value]) => ({ key, value }))
          .filter(e => e.value);
        setOriginEntries(entries);
        originSavedRef.current = new Set(entries.map(e => e.value));
      })
      .catch(() => {})
      .finally(() => setOriginListLoading(false));
  }

  // Splits an origin string on top-level commas only — commas that fall
  // inside (), [], or {} are treated as part of that single entry
  // (e.g. "밀가루(밀:미국,캐나다산), 호두(미국산)" → ["밀가루(밀:미국,캐나다산)", "호두(미국산)"]).
  function splitOriginEntries(value) {
    return splitTopLevelList(value);
  }

  // Returns just the entry currently being typed — the text after the last
  // top-level comma/newline (bracket-aware, same rule as splitOriginEntries). Used
  // so the suggestion list searches/matches against only what's being typed
  // right now, not the whole multi-entry string.
  function getCurrentOriginSegment(value) {
    const s = String(value || "");
    let depth = 0;
    let lastTopSeparatorIdx = -1;
    for (let i = 0; i < s.length; i++) {
      const ch = s[i];
      if (ch === "(" || ch === "[" || ch === "{") depth++;
      else if (ch === ")" || ch === "]" || ch === "}") depth = Math.max(0, depth - 1);
      else if ((ch === "," || ch === "\n" || ch === "\r") && depth === 0) lastTopSeparatorIdx = i;
    }
    return s.slice(lastTopSeparatorIdx + 1).trim();
  }

  // Swaps in a selected/typed entry for just the current segment, keeping
  // any already-completed comma-separated entries before it untouched.
  function replaceCurrentOriginEntry(value, selected) {
    const s = String(value || "");
    let depth = 0;
    let lastTopSeparatorIdx = -1;
    for (let i = 0; i < s.length; i++) {
      const ch = s[i];
      if (ch === "(" || ch === "[" || ch === "{") depth++;
      else if (ch === ")" || ch === "]" || ch === "}") depth = Math.max(0, depth - 1);
      else if ((ch === "," || ch === "\n" || ch === "\r") && depth === 0) lastTopSeparatorIdx = i;
    }
    const prefix = lastTopSeparatorIdx === -1 ? "" : s.slice(0, lastTopSeparatorIdx + 1).replace(/[\r\n]+$/, ",") + " ";
    return prefix + selected;
  }

  // Adds newly-typed origin entries to the shared list (Firebase) so every
  // location/staff member sees the same saved wording next time — this is
  // how free-typed origin text gradually becomes a unified combobox list.
  // A single textarea value can contain several comma-separated origin
  // phrases (e.g. "밀가루(밀:미국,캐나다산), 호두(미국산)"); each one is
  // saved as its own separate entry rather than the whole string as one.
  function saveOriginIfNew(value) {
    const entries = splitOriginEntries(value);
    const newOnes = entries.filter(v => v && !originSavedRef.current.has(v));
    if (newOnes.length === 0) return;
    newOnes.forEach(v => originSavedRef.current.add(v));
    newOnes.forEach(v => {
      fetch(ORIGIN_DB_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(v),
      })
        .then(r => r.json())
        .then(data => {
          if (data && data.name) {
            setOriginEntries(prev => [...prev, { key: data.name, value: v }]);
          }
        })
        .catch(() => {});
    });
  }

  // Removes a saved origin phrase from the shared list for everyone. A
  // phrase can (rarely) exist under more than one Firebase key — e.g. from
  // before duplicate-prevention was in place — so every matching key is
  // deleted, not just the first one.
  function deleteOriginEntry(value) {
    if (!window.confirm(`"${value}" 표기를 목록에서 삭제할까요?\n팀 전체 저장된 표기에서 삭제됩니다.`)) return;
    const keysToDelete = originEntries.filter(e => e.value === value).map(e => e.key);
    setOriginEntries(prev => prev.filter(e => e.value !== value));
    originSavedRef.current.delete(value);
    keysToDelete.forEach(key => {
      fetch(`${ORIGIN_DB_BASE_URL}/${key}.json`, { method: "DELETE" }).catch(() => {});
    });
  }

                          })()}

                      <span className="discount-suffix">% 할인</span>

                              <p className="queue-name">{card.name}</p>
                              <p className="queue-sub">{CARD_TYPE_LIST.find(c => c.id === card.type)?.label}{card.price && ` · ₩${formatPriceText(card.price)}`}</p>
                              {card.allergens.length > 0 && <p className="queue-allergen">{getAllergenLabels(card.allergens)}</p>}
                            </div>
                            <button className="queue-del" onClick={() => setQueue(prev => prev.filter(c => c.id !== card.id))}>
                              <IconTrash size={13} />
                            </button>
                          </div>
                        ))}
                      </div>
                    </React.Fragment>
                  )}
                </div>
              )}

              {rightTab === "saved" && (
                <div className="queue-pane">
                  {savedCardsLoading ? (
                    <div className="queue-empty">
                      <IconRefresh size={28} className="spin" style={{ opacity: .3 }} />
                      <p className="t1">불러오는 중...</p>
                    </div>
                  ) : savedCards.length === 0 ? (
                    <div className="queue-empty">
                      <IconBookmark size={32} style={{ opacity: .2 }} />
                      <p className="t1">저장된 카드가 없습니다</p>
                      <p className="t2">왼쪽 폼에서 "카드로 저장"을 누르면 여기에 쌓여, 다음에 바로 인쇄 목록에 불러올 수 있어요</p>
                    </div>
                  ) : (
                    <React.Fragment>
                      <div className="queue-head">
                        <p className="queue-head-info">총 {savedCards.length}개 저장됨 — 팀 전체가 공유합니다</p>
                      </div>
                      <div className="queue-items">
                        {savedCards.map((card) => (
                          <div key={card.id} className="queue-item saved-item">
                            <div className="queue-thumb">
                              <ShowCard card={card} settings={settings} designs={designs} scale={SCREEN_SCALE * 0.42} />
                            </div>
                            <div className="queue-info">
                              <p className="queue-name">{card.name}</p>
                              <p className="queue-sub">{CARD_TYPE_LIST.find(c => c.id === card.type)?.label}{card.price && ` · ₩${formatPriceText(card.price)}`}</p>
                              {card.allergens && card.allergens.length > 0 && <p className="queue-allergen">{getAllergenLabels(card.allergens)}</p>}
                            </div>
                            <div className="saved-item-actions">
                              <button className="saved-load-btn" onClick={() => addSavedToQueue(card)} title="인쇄 목록에 추가">
                                <IconPrinter size={12} /> 인쇄 목록에
                              </button>
                              <button className="btn-ghost-sm" onClick={() => loadSavedToForm(card)} title="폼에 불러와서 수정">
                                <IconRefresh size={11} /> 폼에 불러오기
                              </button>
                              <button className="queue-del" onClick={() => deleteSavedCard(card.id)}>
                                <IconTrash size={13} />
                              </button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </React.Fragment>
                  )}
                </div>
              )}
            </main>
          </React.Fragment>
        )}

        {mainTab === "manage" && (
          <ManageTab settings={settings} setSettings={setSettings} designs={designs} setDesigns={setDesigns}
            onSave={saveManageChanges} saving={manageSaving} savedAt={manageSavedAt} error={manageError} loaded={manageLoaded}
            reloadProducts={loadProducts} reloadOrigins={loadOrigins} />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
